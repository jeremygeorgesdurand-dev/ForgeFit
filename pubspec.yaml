name: forgefit
description: ForgeFit — application de musculation et suivi d'entraînement orientée progression.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0
  drift: ^2.19.1
  drift_flutter: ^0.2.4
  sqlite3_flutter_libs: ^0.5.24
  cached_network_image: ^3.3.1
  intl: ^0.19.0
  path_drawing: ^1.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  drift_dev: ^2.19.1
  build_runner: ^2.4.11
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    - assets/data/exercises.json
    - assets/images/
    - assets/videos/
    - assets/icon/
